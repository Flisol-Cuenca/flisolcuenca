<style>
/* ==========================================================================
   SPONSORS
   ========================================================================== */
.sponsors-level {
    margin-bottom: var(--space-xl);
}

.sponsors-level:last-child {
    margin-bottom: 0;
}

.sponsors-tier {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5em;
    font-size: 1.15rem;
    margin-bottom: var(--space-md);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.sponsors-tier--sede  { color: var(--color-red); }
.sponsors-tier--gold  { color: var(--color-gold-dark); }
.sponsors-tier--bronze{ color: var(--color-coral); }

.sponsors-grid {
    display: grid;
    gap: var(--space-md);
    justify-items: center;
}

.sponsors-grid--sede {
    grid-template-columns: 1fr;
    max-width: 400px;
    margin: 0 auto;
}

.sponsors-grid--gold {
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    max-width: 600px;
    margin: 0 auto;
}

.sponsors-grid--bronze {
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    max-width: 700px;
    margin: 0 auto;
}

.sponsor-card {
    width: 100%;
    text-align: center;
    padding: var(--space-md);
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    transition: transform var(--transition), box-shadow var(--transition);
}

.sponsor-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
}

.sponsor-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto var(--space-sm);
    border: 2px dashed var(--color-silver);
    border-radius: var(--radius-sm);
    background: var(--color-cream);
}

.sponsor-card--sede   .sponsor-logo { width: 240px; height: 120px; }
.sponsor-card--gold   .sponsor-logo { width: 180px; height: 90px; }
.sponsor-card--bronze .sponsor-logo { width: 140px; height: 70px; }

.sponsor-logo span {
    font-size: 0.8rem;
    color: var(--color-slate);
}

.sponsor-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--color-text);
}
</style>
