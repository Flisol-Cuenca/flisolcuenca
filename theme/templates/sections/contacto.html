<style>
/* ==========================================================================
   CONTACTO
   ========================================================================== */
.contacto-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-lg);
}

@media (min-width: 768px) {
    .contacto-grid {
        grid-template-columns: 1fr 1fr;
        align-items: start;
    }
}

.contacto-item {
    display: flex;
    gap: var(--space-sm);
    padding: var(--space-md);
    background: var(--color-bg);
    border-radius: var(--radius-md);
    border: 1px solid var(--color-border);
    margin-bottom: var(--space-sm);
}

.contacto-item svg {
    flex-shrink: 0;
    color: var(--color-red);
    margin-top: 2px;
}

.contacto-item h3 {
    font-size: 0.9rem;
    margin-bottom: 0.25em;
}

.contacto-item p,
.contacto-item a {
    font-size: 0.9rem;
    color: var(--color-slate);
}

.contacto-item a:hover {
    color: var(--color-red);
}

.map-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 75%;
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--color-border);
    background: var(--color-cream);
    cursor: pointer;
}

.map-wrapper iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
}

.map-facade {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-xs);
    color: var(--color-text);
    transition: background var(--transition);
}

.map-wrapper:hover .map-facade {
    background: rgba(0, 0, 0, 0.03);
}

.map-facade-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5em;
    padding: 0.6em 1.4em;
    background: var(--color-red);
    color: var(--color-bg);
    border-radius: var(--radius-sm);
    font-family: var(--font-primary);
    font-weight: 700;
    font-size: 0.95rem;
    box-shadow: var(--shadow-md);
    transition: background var(--transition), transform var(--transition);
}

.map-wrapper:hover .map-facade-btn {
    background: var(--color-red-dark);
    transform: translateY(-1px);
}

.map-facade svg {
    opacity: 0.4;
}

.map-facade p {
    font-size: 0.85rem;
    color: var(--color-slate);
    margin-top: var(--space-xs);
}

@media (min-width: 768px) {
    .map-wrapper {
        padding-bottom: 56.25%;
    }
}
</style>

<!-- Contacto -->
<section id="contacto" class="section section--alt" aria-labelledby="contacto-title">

        <h2 id="contacto-title" class="section-title">Contacto</h2>

        <div class="contacto-grid">
            <div class="contacto-info">
                <div class="contacto-item">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <div>
                        <h3>Email</h3>
                        <a href="mailto:info@flisolcuenca.org">info@flisolcuenca.org</a>
                    </div>
                </div>
                <div class="contacto-item">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    <div>

                    <div>

                    </div>
                </div>
            </div>
            <div class="contacto-map">

                     onclick="this.innerHTML='<iframe src=&quot;'+this.dataset.mapSrc+'&quot; allowfullscreen loading=&quot;lazy&quot; referrerpolicy=&quot;no-referrer-when-downgrade&quot; style=&quot;position:absolute;inset:0;width:100%;height:100%;border:0&quot;></iframe>';this.style.cursor='default'">
                    <div class="map-facade">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        <span class="map-facade-btn">Ver mapa</span>
                        <p>Universidad Politécnica Salesiana</p>
                    </div>

            </div>
        </div>
    </div>
</section>
